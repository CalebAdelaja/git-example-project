<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=   , initial-scale=1.0">
    <title>MED APP FIX</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="iphone16pro-28">
            <div class="status-bar">
                <div class="time-nav">
                <!-- LEFT SIDE -->
                <div class="time">
                    <p>5:00</p>
                </div>
                <!-- MIDDLE SIDE -->
                <div class="ellipse">
                    <img src="images-icons/Ellipse 2838.png" alt="Ellipse">
                </div>
                <!-- RIGHT SIDE -->
                 <div class="wifi-cellular-battery">
                    <div class="cellular">
                        <img src="images-icons/Cellular Connection.png" alt="Cellular Connection">
                    </div>
                    <div class="wifi">
                        <img src="images-icons/Wifi.png" alt="Wifi">
                    </div>
                    <div class="battery">
                        <img src="images-icons/Battery.png" alt="Battery" width="27.33px" height="13px">
                    </div>
                 </div>
             </div>
            </div>
            
            <main>
                <div class="good-morning-wrapper">
                    <!-- LEFT SIDE -->
                    <div class="good-morning">
                        <div class="sun-good-morning">
                            <img src="images-icons/sun-02.png" alt="sun">
                            <div class="good-morning-text">
                                <p>Good Morning!</p>
                            </div>
                        </div>
                        <div class="the-name">
                            <div class="name-text">
                                <h2>A.Caleb👋</h2>
                            </div>
                        </div>
                    </div>
                    <!-- RIGHT SIDE -->
                     <div class="bell-container">
                        <img src="images-icons/Group-bell 42973.png" alt="bell">                  
                     </div>
                </div>

                <div class="activities-wrapper">
                    <div class="activities">
                        <div class="activity">
                            <div class="activity-text">
                                <p>My Activity</p>
                            </div>
                        </div>
                        <div class="date-month">
                            <div class="date8-9">
                                <div class="date8">
                                    <p>08</p>
                                </div>
                                <div class="date9">
                                    <p>09</p>
                                </div>
                            </div>
                            <div class="todays-date">
                                <p>Today, 10 April</p>
                            </div>
                            <div class="date11-12">
                                <div class="date11">
                                    <p>11</p>
                                </div>
                                <div class="date12">
                                    <p>12</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="wellness-wrapper">
                    <div class="wellness-trend-container">
                        <div class="wellness-trend">
                            <div class="wellness-trend-text">
                                <p>wellness Trend</p>
                            </div>

                            <div class="wellness-trend-stastic">
                                <div class="rec1">
                                    <div class="white1"></div>
                                    <div class="blue1"></div>
                                </div>
                                <div class="rec2">
                                    <div class="white2"></div>
                                    <div class="blue2"></div>
                                </div>
                                <div class="rec3">
                                    <div class="white3"></div>
                                    <div class="blue3"></div>
                                </div>
                                <div class="rec4">
                                    <div class="white4"></div>
                                    <div class="blue4"></div>
                                </div>
                                <div class="rec5">
                                    <div class="white5"></div>
                                    <div class="blue5"></div>
                                </div>
                                <div class="rec6">
                                    <div class="white6"></div>
                                    <div class="blue6"></div>
                                </div>
                                <div class="rec7">
                                    <div class="white7"></div>
                                    <div class="blue7"></div>
                                </div>
                                <div class="rec8">
                                    <div class="white8"></div>
                                    <div class="blue8"></div>
                                </div>
                                <div class="rec9">
                                    <div class="white9"></div>
                                    <div class="blue9"></div>
                                </div>
                                <div class="rec10">
                                    <div class="white10"></div>
                                    <div class="blue10"></div>
                                </div>
                                <div class="rec11">
                                    <div class="white11"></div>
                                    <div class="blue11"></div>
                                </div>
                                <div class="rec12">
                                    <div class="white12"></div>
                                    <div class="blue12"></div>
                                </div>
                                <div class="rec13">
                                    <div class="white13"></div>
                                    <div class="blue13"></div>
                                </div>
                                <div class="rec14">
                                    <div class="white14"></div>
                                    <div class="blue14"></div>
                                </div>
                                <div class="rec15">
                                    <div class="white15"></div>
                                    <div class="blue15"></div>
                                </div>
                                <div class="rec1">
                                    <div class="white16"></div>
                                    <div class="blue16"></div>
                                </div>
                                <div class="rec17">
                                    <div class="white17"></div>
                                    <div class="blue17"></div>
                                </div>
                                <div class="rec18">
                                    <div class="white18"></div>
                                    <div class="blue18"></div>
                                </div>
                            </div>

                            <div class="wellness-score-container">
                                <img src="images-icons/wellness-score.png" alt="wellness-score" width="50px" height="50px">
                                <div class="wellness-score">
                                    <div class="wellness-score-texts">
                                        <p>wellness score</p>
                                    </div>
                                    <div class="good-progress">
                                        <p>Good progress today</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="last-section">
                    <!-- HEART RATE & HYDRATION -->
                    <div class="heartRate-hydration">
                        <!-- HEART RATE-->
                        <div class="heart-rate-container">
                            <div class="heart-rate-content">
                                <div class="heart-rate-text-container">
                                    <img src="images-icons/Heartbeat.png" alt="">
                                    <div class="heart-rate-text">
                                        <p>Heart Rate</p>
                                    </div> 
                                </div>
                                <div class="heart-rate-stastic">
                                    <div class="heart-rate-number">
                                        <h1>68</h1>
                                    </div>
                                    <div class="heart-rate-type">
                                        <p>bpms</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- HYDRATION -->
                        <div class="heart-rate-container">
                            <div class="heart-rate-content">
                                <div class="heart-rate-text-container">
                                    <img src="images-icons/PintGlass.png" alt="">
                                    <div class="heart-rate-text">
                                        <P>Hydration</P>
                                    </div>
                                </div>
                                <div class="heart-rate-stastic">
                                    <div class="heart-rate-number">
                                        <h1>1.8</h1>
                                    </div>
                                    <div class="heart-rate-type">
                                        <p>Liters</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <!-- ENERGY AND SLEEPS -->
                    <div class="heartRate-hydration">
                        <!-- ENERGY-->
                        <div class="heart-rate-container">
                            <div class="heart-rate-content">
                                <div class="heart-rate-text-container">
                                    <img src="images-icons/Fire.png" alt="">
                                    <div class="heart-rate-text">
                                        <p>Energy</p>
                                    </div> 
                                </div>
                                <div class="heart-rate-stastic">
                                    <div class="heart-rate-number">
                                        <h1>1.380</h1>
                                    </div>
                                    <div class="heart-rate-type">
                                        <p>Daily rates</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- SLEEPS -->
                        <div class="heart-rate-container">
                            <div class="heart-rate-content">
                                <div class="heart-rate-text-container">
                                    <img src="images-icons/Bed.png" alt="">
                                    <div class="heart-rate-text">
                                        <P>Sleeps</P>
                                    </div>
                                </div>
                                <div class="heart-rate-stastic">
                                    <div class="heart-rate-number">
                                        <h1>7:30</h1>
                                    </div>
                                    <div class="heart-rate-type">
                                        <p>Hours</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
            <footer>
                <div class="home-indicator"></div>
            </footer>
        </div>
</body>
</html>
